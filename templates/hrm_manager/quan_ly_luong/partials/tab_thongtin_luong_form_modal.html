<div id="salary-columns-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-[1px]">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[90vh] animate-fade-in">
        
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <h3 class="text-lg font-bold text-slate-800">Chọn cột bảng lương</h3>
            <button type="button" class="text-slate-400 hover:text-slate-600" onclick="window.SalaryInfoManager.closeModal()">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>

        <div class="flex-1 overflow-auto p-6 bg-slate-50">
            <div id="salary-tree-container" class="space-y-4">
                <div class="text-center text-slate-500 py-4"><i class="fas fa-spinner fa-spin"></i> Đang tải danh sách...</div>
            </div>
        </div>

        <div class="px-6 py-4 border-t border-slate-100 bg-white rounded-b-xl flex justify-end items-center">
            <button type="button" onclick="window.SalaryInfoManager.applyColumns()" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium shadow-sm transition-colors flex items-center gap-2">
                <i class="fas fa-plus"></i> Cập nhật bảng
            </button>
        </div>
    </div>
</div>

<template id="tree-group-template">
    <div class="bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden group-item">
        <div class="flex items-center gap-3 px-4 py-3 bg-slate-50/50 hover:bg-slate-50 cursor-pointer border-b border-slate-100/50" onclick="window.SalaryInfoManager.toggleGroup(this)">
            <div class="flex items-center h-5">
                <input type="checkbox" class="group-checkbox w-4 h-4 text-green-600 rounded border-slate-300 focus:ring-green-500 cursor-pointer" onclick="event.stopPropagation(); window.SalaryInfoManager.handleGroupCheck(this)">
            </div>
            <div class="flex-1 flex items-center gap-2">
                <svg class="w-4 h-4 text-slate-400 transform transition-transform duration-200 group-arrow" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                <i class="fas fa-folder text-yellow-500"></i>
                <span class="font-medium text-slate-700 group-name">Tên nhóm</span>
            </div>
        </div>
        <div class="children-container hidden pl-12 pr-4 py-2 space-y-1 border-t border-slate-50">
            </div>
    </div>
</template>
