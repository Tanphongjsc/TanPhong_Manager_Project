<input type="hidden" id="id" name="id">

<div>
    <label for="tenphantu" class="block text-sm font-medium text-slate-700 mb-2">
        <span class="text-red-500">*</span> Tên phần tử lương:
    </label>
    <input type="text" 
           id="tenphantu" 
           name="tenphantu" 
           required
           placeholder="Ví dụ: Lương cơ bản, Phụ cấp..."
           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
</div>

<div>
    <label for="maphantu" class="block text-sm font-medium text-slate-700 mb-2">
        <span class="text-red-500">*</span> Mã phần tử:
    </label>
    <input type="text" 
           id="maphantu" 
           name="maphantu" 
           required
           placeholder="Tự động tạo từ tên..."
           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-white">
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
        <label for="loaiphantu" class="block text-sm font-medium text-slate-700 mb-2">
            <span class="text-red-500">*</span> Loại phần tử:
        </label>
        <select id="loaiphantu" 
                name="loaiphantu" 
                required
                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
            <option value="">-- Chọn loại --</option>
            <option value="THU_NHAP">Thu nhập</option>
            <option value="KHAU_TRU">Khấu trừ</option>
        </select>
    </div>

    <div>
        <label for="nhomphantu" class="block text-sm font-medium text-slate-700 mb-2">
            <span class="text-red-500">*</span> Nhóm phần tử:
        </label>
        <select id="nhomphantu" 
                name="nhomphantu" 
                required
                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
            <option value="">-- Chọn nhóm --</option>
            </select>
    </div>
</div>

<div>
    <label for="mota" class="block text-sm font-medium text-slate-700 mb-2">
        Mô tả / Ghi chú:
    </label>
    <textarea id="mota" 
              name="mota" 
              rows="3"
              class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"></textarea>
</div>
