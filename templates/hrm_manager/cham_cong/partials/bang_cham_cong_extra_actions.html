<div class="flex items-center gap-1.5 shrink-0">
    <button id="btn-delete-records" onclick="window.ChamCongManager.deleteSelectedRecords()" 
        class="h-8 min-w-[80px] px-2 text-xs font-semibold text-white bg-red-600 rounded hover:bg-red-700 flex items-center justify-center gap-1 hidden">
        <i class="fa-solid fa-trash"></i>
        <span class="hidden sm:inline">Xóa</span>
    </button>
    <button onclick="window.ChamCongManager.loadResources()" 
        class="h-8 min-w-[80px] px-2 text-xs font-semibold text-slate-600 bg-white border border-slate-300 rounded hover:bg-slate-50 flex items-center justify-center gap-1" title="Làm mới">
        <i class="fa-solid fa-rotate"></i>
    </button>

    <button onclick="window.ChamCongManager.saveData()" 
        class="h-8 min-w-[80px] px-2 text-xs font-semibold text-white bg-blue-600 rounded hover:bg-blue-700 flex items-center justify-center gap-1">
        <i class="fa-solid fa-save"></i>
        <span class="hidden sm:inline">Lưu</span>
    </button>
</div>
