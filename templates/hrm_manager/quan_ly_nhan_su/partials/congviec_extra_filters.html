<select name="loaicongviec"
        class="px-2.5 py-1 text-xs border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 bg-white cursor-pointer">
    <option value="">Tất cả loại công việc</option>
    {% for item in loai_cong_viec_list %}
        <option value="{{ item.value }}" {% if request.GET.loaicongviec == item.value %}selected{% endif %}>
            {{ item.label }}
        </option>
    {% endfor %}
</select>
