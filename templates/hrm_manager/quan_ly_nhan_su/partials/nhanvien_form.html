<div class="space-y-5">
    <input type="hidden" name="id">
    
    <!-- Row 1: Mã NV + Họ tên -->
    <div class="grid grid-cols-3 gap-4">
        <div>
            <label for="manhanvien" class="block text-sm font-medium text-slate-700 mb-1.5">
                <span class="text-red-500">*</span> Mã nhân viên:
            </label>
            <input type="text" 
                   id="manhanvien"
                   name="manhanvien" 
                   required
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-slate-50 text-sm">
        </div>
        <div class="col-span-2">
            <label for="hovaten" class="block text-sm font-medium text-slate-700 mb-1.5">
                <span class="text-red-500">*</span> Họ và tên:
            </label>
            <input type="text" 
                   id="hovaten"
                   name="hovaten" 
                   required 
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
        </div>
    </div>

    <!-- Row 2: Email + SĐT -->
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">
                Email:
            </label>
            <input type="email" 
                   id="email"
                   name="email" 
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
        </div>
        <div>
            <label for="sodienthoai" class="block text-sm font-medium text-slate-700 mb-1.5">
                Số điện thoại:
            </label>
            <input type="text" 
                   id="sodienthoai"
                   name="sodienthoai" 
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
        </div>
    </div>

    <!-- Row 3: Giới tính + Ngày vào làm -->
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label for="gioitinh" class="block text-sm font-medium text-slate-700 mb-1.5">
                Giới tính:
            </label>
            <select id="gioitinh"
                    name="gioitinh" 
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                <option value="">-- Chọn --</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
            </select>
        </div>
        <div>
            <label for="ngayvaolam" class="block text-sm font-medium text-slate-700 mb-1.5">
                <span class="text-red-500">*</span> Ngày vào làm:
            </label>
            <input type="date" 
                   id="ngayvaolam"
                   name="ngayvaolam" 
                   required
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
        </div>
    </div>

    <!-- Row 4: Chức vụ + Loại nhân viên -->
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label for="chucvu" class="block text-sm font-medium text-slate-700 mb-1.5">
                <span class="text-red-500">*</span> Chức vụ:
            </label>
            <select id="chucvu"
                    name="chucvu" 
                    required
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                <option value="">-- Chọn chức vụ --</option>
            </select>
        </div>
        <div>
            <label for="loainv_id" class="block text-sm font-medium text-slate-700 mb-1.5">
                <span class="text-red-500">*</span> Loại nhân viên:
            </label>
            <select id="loainv_id"
                    name="loainv_id"
                    required
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                <option value="">-- Chọn loại nhân viên --</option>
            </select>
        </div>
    </div>

    <!-- Row 5: Trạng thái NV -->
    <div class="grid grid-cols-1 gap-4">
        <div>
            <label for="trangthainv" class="block text-sm font-medium text-slate-700 mb-1.5">
                Trạng thái NV:
            </label>
            <select id="trangthainv"
                    name="trangthainv" 
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                <option value="">-- Chọn --</option>
                <option value="Đang làm việc">Đang làm việc</option>
                <option value="Thử việc">Thử việc</option>
                <option value="Đã nghỉ việc">Đã nghỉ việc</option>
            </select>
        </div>
    </div>

    <!-- Row 6: Phòng ban (OrgTree dropdown component - required) -->
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">
            <span class="text-red-500">*</span> Phòng ban:
        </label>
        {% include "components/org_tree.html" with component_id="phongban-picker" variant="dropdown" show_actions=False show_all=False show_search=True search_placeholder="Tìm phòng ban..." dropdown_label="-- Chọn phòng ban --" hidden_input_name="phongban" %}
    </div>

    <!-- Row 7: Nơi công tác -->
    <div>
        <label for="noicongtac" class="block text-sm font-medium text-slate-700 mb-1.5">
            Nơi công tác:
        </label>
        <input type="text" 
               id="noicongtac"
               name="noicongtac" 
               placeholder="VD: Chi nhánh HCM, Văn phòng Hà Nội..."
               class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
    </div>

    
    <!-- Section: Thông tin khác -->
    <div class="border-t border-slate-200 pt-4 mt-2">
        <h4 class="text-sm font-semibold text-slate-800 mb-3">Thông tin khác</h4>
        <div class="mb-4">
            <label for="socccd" class="block text-sm font-medium text-slate-700 mb-1.5">
                Số CCCD:
            </label>
            <input type="text" 
                   id="socccd"
                   name="socccd" 
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
        </div>
        <div class="mb-4">
            <label for="nganhang" class="block text-sm font-medium text-slate-700 mb-1.5">
                Ngân hàng:
            </label>
            <select id="nganhang"
                    name="nganhang" 
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                <option value="">-- Chọn ngân hàng --</option>
            </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="tentknganhang" class="block text-sm font-medium text-slate-700 mb-1.5">
                    Tên TK ngân hàng:
                </label>
                <input type="text" 
                       id="tentknganhang"
                       name="tentknganhang" 
                       placeholder="Tên chủ TK" 
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
            </div>
            <div>
                <label for="sotknganhang" class="block text-sm font-medium text-slate-700 mb-1.5">
                    Số tài khoản:
                </label>
                <input type="text" 
                       id="sotknganhang"
                       name="sotknganhang" 
                       placeholder="Số tài khoản" 
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
            </div>
        </div>
    </div>
</div>
