<input type="hidden" name="id" />

<!-- Thông tin cơ bản - Compact 2 columns -->
<div class="grid grid-cols-2 gap-3">
    <div>
        <label class="text-xs font-medium text-slate-600 mb-0.5 block">Tên công việc <span class="text-red-500">*</span></label>
        <input name="tencongviec" type="text" required placeholder="Nhập tên..."
               class="w-full px-2.5 py-1.5 text-sm border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div>
        <label class="text-xs font-medium text-slate-600 mb-0.5 block">Mã công việc <span class="text-red-500">*</span></label>
        <input name="macongviec" type="text" required placeholder="Tự động..."
               class="w-full px-2.5 py-1.5 text-sm border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div>
        <label class="text-xs font-medium text-slate-600 mb-0.5 block">Loại</label>
        <select name="loaicongviec" class="w-full px-2.5 py-1.5 text-sm border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500">
            <option value="">-- Chọn --</option>
            <option value="nhom">Nhóm</option>
            <option value="canhan">Cá nhân</option>
        </select>
    </div>
    <div>
        <label class="text-xs font-medium text-slate-600 mb-0.5 block">Mô tả</label>
        <input name="mota" type="text" placeholder="Mô tả ngắn..."
               class="w-full px-2.5 py-1.5 text-sm border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div class="col-span-2">
        <label class="text-xs font-medium text-slate-600 mb-0.5 block">Ghi chú</label>
        <input name="ghichu" type="text" placeholder="Ghi chú thêm..."
               class="w-full px-2.5 py-1.5 text-sm border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
    </div>
</div>

<!-- Toggle công thức - Compact -->
<div class="flex items-center justify-between mt-4 p-2.5 bg-gradient-to-r from-slate-50 to-blue-50 rounded-lg border border-slate-200">
    <div class="flex items-center gap-2">
        <span class="text-lg">🧮</span>
        <div>
            <span class="text-sm font-medium text-slate-700">Công thức tính tiền</span>
            <span class="text-xs text-slate-400 ml-1">(tùy chọn)</span>
        </div>
    </div>
    <label class="relative inline-flex items-center cursor-pointer">
        <input type="checkbox" name="trangthaicongthuc" id="toggle-congthuc" class="sr-only peer" value="on">
        <div class="w-9 h-5 bg-slate-300 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"></div>
    </label>
</div>

<!-- Formula Section - Compact -->
<div id="formula-section" class="hidden mt-3 p-3 bg-blue-50/60 border border-blue-100 rounded-lg space-y-3">
    
    <!-- Tham số - Tag style -->
    <div>
        <div class="flex items-center justify-between mb-2">
            <span class="text-xs font-semibold text-slate-600 uppercase tracking-wide">Tham số</span>
            <button type="button" id="btn-add-thamso" class="text-xs text-blue-600 hover:text-blue-800 font-medium flex items-center gap-0.5">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Thêm
            </button>
        </div>
        
        <div id="thamso-container" class="space-y-1.5"></div>
        <p id="thamso-empty" class="text-xs text-slate-400 italic py-2 text-center border border-dashed border-slate-300 rounded bg-white/50">
            Nhấn "Thêm" để tạo tham số
        </p>
    </div>

    <!-- Biểu thức - Compact keyboard -->
    <div>
        <span class="text-xs font-semibold text-slate-600 uppercase tracking-wide block mb-2">Biểu thức</span>
        
        <!-- Mini keyboard -->
        <div class="flex flex-wrap gap-1 p-2 bg-white rounded border border-slate-200 mb-2">
            <!-- Params -->
            <div id="formula-params" class="flex flex-wrap gap-1 w-full pb-1.5 mb-1.5 border-b border-slate-100">
                <span class="text-[10px] text-slate-400 w-full">Tham số:</span>
            </div>
            
            <!-- Operators row -->
            <div class="flex flex-wrap gap-1 w-full">
                <span class="text-[10px] text-slate-400 w-full mb-0.5">Phép tính:</span>
                <button type="button" class="formula-btn w-7 h-7 text-xs font-bold bg-orange-50 text-orange-600 border border-orange-200 rounded hover:bg-orange-100" data-insert=" + ">+</button>
                <button type="button" class="formula-btn w-7 h-7 text-xs font-bold bg-orange-50 text-orange-600 border border-orange-200 rounded hover:bg-orange-100" data-insert=" - ">−</button>
                <button type="button" class="formula-btn w-7 h-7 text-xs font-bold bg-orange-50 text-orange-600 border border-orange-200 rounded hover:bg-orange-100" data-insert=" * ">×</button>
                <button type="button" class="formula-btn w-7 h-7 text-xs font-bold bg-orange-50 text-orange-600 border border-orange-200 rounded hover:bg-orange-100" data-insert=" / ">÷</button>
                <button type="button" class="formula-btn w-7 h-7 text-xs bg-slate-100 text-slate-600 border border-slate-200 rounded hover:bg-slate-200" data-insert="(">(</button>
                <button type="button" class="formula-btn w-7 h-7 text-xs bg-slate-100 text-slate-600 border border-slate-200 rounded hover:bg-slate-200" data-insert=")">)</button>
                <span class="w-px h-5 bg-slate-200 mx-1 self-center"></span>
                <button type="button" class="formula-btn px-1.5 h-7 text-[10px] bg-green-50 text-green-700 border border-green-200 rounded hover:bg-green-100" data-insert="IF(" title="IF(điều_kiện, đúng, sai)">IF</button>
                <button type="button" class="formula-btn px-1.5 h-7 text-[10px] bg-green-50 text-green-700 border border-green-200 rounded hover:bg-green-100" data-insert="MIN(">MIN</button>
                <button type="button" class="formula-btn px-1.5 h-7 text-[10px] bg-green-50 text-green-700 border border-green-200 rounded hover:bg-green-100" data-insert="MAX(">MAX</button>
                <button type="button" class="formula-btn px-1.5 h-7 text-[10px] bg-green-50 text-green-700 border border-green-200 rounded hover:bg-green-100" data-insert="ROUND(">RND</button>
                <span class="w-px h-5 bg-slate-200 mx-1 self-center"></span>
                <button type="button" class="formula-btn w-7 h-7 text-[10px] bg-purple-50 text-purple-600 border border-purple-200 rounded hover:bg-purple-100" data-insert=" > ">&gt;</button>
                <button type="button" class="formula-btn w-7 h-7 text-[10px] bg-purple-50 text-purple-600 border border-purple-200 rounded hover:bg-purple-100" data-insert=" < ">&lt;</button>
                <button type="button" class="formula-btn w-7 h-7 text-[10px] bg-purple-50 text-purple-600 border border-purple-200 rounded hover:bg-purple-100" data-insert=" >= ">≥</button>
                <button type="button" class="formula-btn w-7 h-7 text-[10px] bg-purple-50 text-purple-600 border border-purple-200 rounded hover:bg-purple-100" data-insert=", ">,</button>
            </div>
        </div>
        
        <!-- Formula input -->
        <div class="relative">
            <textarea name="bieuthuctinhtoan" id="formula-input" rows="2"
                      placeholder="VD: so_luong * don_gia"
                      class="w-full px-2.5 py-2 pr-8 font-mono text-xs border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 resize-none"></textarea>
            <button type="button" id="btn-formula-clear" title="Xóa" class="absolute right-1.5 top-1.5 p-1 text-slate-300 hover:text-red-500 rounded">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        
        <!-- Preview inline -->
        <div id="formula-preview" class="hidden mt-1.5 px-2 py-1 bg-green-50 border border-green-200 rounded text-[11px]">
            <span class="text-green-600">→</span>
            <code id="formula-preview-text" class="font-mono text-green-700 ml-1"></code>
        </div>
    </div>
</div>

<!-- Hidden -->
<input type="hidden" name="danhsachthamso" id="hidden-thamso-json" value="[]">

<!-- Template tham số - Inline compact -->
<template id="thamso-row-template">
    <div class="thamso-row flex flex-wrap items-center gap-1.5 p-1.5 bg-white rounded border border-slate-200 group" data-index="">
        <input type="text" class="thamso-ten flex-1 min-w-[100px] px-2 py-1 text-xs border border-slate-200 rounded focus:ring-1 focus:ring-blue-400 focus:border-blue-400" placeholder="Tên">
        <input type="text" class="thamso-ma w-20 px-2 py-1 text-xs font-mono bg-slate-50 border border-slate-200 rounded" placeholder="mã" readonly>
        <input type="text" class="thamso-donvi w-16 px-2 py-1 text-xs border border-slate-200 rounded" placeholder="Đ.vị">
        <select class="thamso-kieu w-16 px-1 py-1 text-xs border border-slate-200 rounded bg-white">
            <option value="number">Số</option>
            <option value="currency">Tiền</option>
            <option value="percent">%</option>
        </select>
        <input type="text" class="thamso-default w-16 px-2 py-1 text-xs border border-slate-200 rounded" placeholder="M.định">
        <button type="button" class="btn-remove-thamso p-0.5 text-slate-300 hover:text-red-500 rounded opacity-0 group-hover:opacity-100 transition-opacity">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
</template>
