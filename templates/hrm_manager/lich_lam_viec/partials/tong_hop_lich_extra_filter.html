<div class="flex items-center gap-1.5">
    <div class="flex items-center bg-white border border-slate-300 rounded-md px-2 py-1 h-[26px] hover:border-blue-400 transition-colors">
        <i class="fa-regular fa-calendar text-slate-500 mr-1.5 text-[10px]"></i>
     <div class="relative">
         <input type="date" id="filter-start-date" name="start_date"
             class="bg-transparent border-none text-slate-700 font-medium focus:outline-none text-xs cursor-pointer p-0 h-full leading-none">
     </div>
        <span class="text-slate-300 px-1 text-[11px]">-</span>
     <div class="relative">
         <input type="date" id="filter-end-date" name="end_date"
             class="bg-transparent border-none text-slate-700 font-medium focus:outline-none text-xs cursor-pointer p-0 h-full leading-none">
     </div>
    </div>

    <button type="button" id="btn-range-week"
            class="px-2 py-1 text-[11px] border border-slate-300 rounded-md text-slate-600 hover:text-blue-600 hover:border-blue-400 transition-colors h-[26px]">
        7 Ngày
    </button>

    <button type="button" id="btn-range-month"
            class="px-2 py-1 text-[11px] border border-slate-300 rounded-md text-slate-600 hover:text-blue-600 hover:border-blue-400 transition-colors h-[26px]">
        1 Tháng
    </button>
</div>

<select id="filter-lichlamviec" name="lichlamviec_id"
        class="px-2 py-1 text-xs border border-slate-300 rounded-md focus:ring-1 focus:ring-blue-500 bg-white cursor-pointer text-slate-600 max-w-[220px] truncate h-[26px]">
    <option value="">Tất cả nhóm lịch</option>
</select>

<div id="dept-filter-wrapper" class="relative">
    <input type="hidden" id="filter-phongban-id" name="phongban_id" value="">

    <button type="button" id="filter-dept-btn"
            class="flex items-center justify-between gap-2 px-2.5 py-1 text-xs border border-slate-300 rounded-md bg-white hover:border-blue-400 transition-colors h-[26px] min-w-[170px] max-w-[220px]">
        <span id="filter-dept-text" class="truncate text-slate-600">Tất cả bộ phận</span>
        <i class="fas fa-chevron-down text-[10px] text-slate-400"></i>
    </button>

        <div id="filter-dept-dropdown"
            class="hidden absolute top-full right-0 mt-1 w-[320px] max-h-80 overflow-y-auto custom-scrollbar bg-white border border-slate-200 rounded-lg shadow-xl p-2 z-40">
        <div id="filter-dept-tree" class="space-y-0.5">
            <div class="text-xs text-slate-400 p-2">Đang tải bộ phận...</div>
        </div>
    </div>
</div>
